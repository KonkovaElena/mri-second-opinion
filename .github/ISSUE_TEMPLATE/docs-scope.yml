name: Docs or scope issue
description: Report documentation drift, misleading wording, or scope confusion in MRI Standalone
title: "[Docs]: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Use this form when the repository docs, README, or release language no longer match the implemented MRI standalone baseline.
  - type: textarea
    id: problem
    attributes:
      label: What is unclear or misleading?
      description: Describe the documentation drift, wording problem, or scope mismatch.
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Affected files or sections
      description: Link the exact README, docs page, or section that needs correction.
      placeholder: README.md, docs/api-scope.md, docs/releases/v1-go-no-go.md
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should the docs say instead?
      description: Describe the smallest truthful correction.
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Drift category
      options:
        - Scope boundary mismatch
        - README or landing-page mismatch
        - Release or readiness claim mismatch
        - API or status-model mismatch
        - Contributor workflow confusion
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste route output, test output, screenshots, or linked docs that show the mismatch.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I checked that this issue does not contain PHI, secrets, or real clinical data.
          required: true
        - label: I checked README.md and the linked docs before filing.
          required: true
