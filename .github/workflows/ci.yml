name: ci

on:
  workflow_dispatch:
  push:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.env.example'
      - 'src/**'
      - 'tests/**'
      - 'sql/**'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.env.example'
      - 'src/**'
      - 'tests/**'
      - 'sql/**'
      - 'scripts/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  install-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Validate Docker Compose config
        run: docker compose -f docker-compose.yml config --quiet

      - name: Build container image
        run: docker build -t mri-second-opinion:ci .

      - name: Smoke test compose app service
        env:
          PORT: 4110
        run: |
          docker compose -p mri-ci -f docker-compose.yml up -d --build app
          trap 'docker compose -p mri-ci -f docker-compose.yml down --volumes --remove-orphans' EXIT
          node <<'EOF'
          const { execSync } = require('node:child_process');

          const port = process.env.PORT || '4110';
          const deadline = Date.now() + 120000;

          async function waitForReadyAndHealthy() {
            while (Date.now() < deadline) {
              let ready = false;
              let health = '';

              try {
                const response = await fetch(`http://127.0.0.1:${port}/readyz`);
                ready = response.ok;
              } catch {
                ready = false;
              }

              try {
                health = execSync(
                  "docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' mri-ci-app-1",
                  { encoding: 'utf8' },
                ).trim();
              } catch {
                health = '';
              }

              if (ready && health === 'healthy') {
                return;
              }

              await new Promise((resolve) => setTimeout(resolve, 2000));
            }

            throw new Error('Compose app service did not become ready and healthy within 120 seconds');
          }

          waitForReadyAndHealthy().catch((error) => {
            console.error(error instanceof Error ? error.message : String(error));
            process.exit(1);
          });
          EOF

      - name: Generate CycloneDX SBOM
        run: npm run sbom

      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: artifacts/sbom.cdx.json
          if-no-files-found: error
          retention-days: 30

  postgres-smoke:
    runs-on: ubuntu-latest
    needs: install-and-build
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mri_smoke
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations against clean database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mri_smoke
        run: npm run db:migrate

      - name: Verify migration state
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mri_smoke
        run: |
          node -e "
            const pg = require('pg');
            const pool = new pg.Pool({ connectionString: process.env.DATABASE_URL });
            (async () => {
              const t = await pool.query(\"SELECT EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'case_records') AS ok\");
              const m = await pool.query('SELECT id FROM schema_migrations ORDER BY id');
              console.log('case_records exists:', t.rows[0].ok);
              console.log('migrations:', m.rows.map(r => r.id).join(', '));
              if (!t.rows[0].ok) { process.exitCode = 1; console.error('FAIL: case_records not found'); }
              await pool.end();
            })();
          "

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
