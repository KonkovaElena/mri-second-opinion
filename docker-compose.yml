services:
  app:
    build:
      context: .
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-4010}
      MRI_CASE_STORE_MODE: ${MRI_CASE_STORE_MODE:-sqlite}
      MRI_CASE_STORE_FILE: /data/cases.sqlite
      MRI_REVIEWER_JWT_HS256_SECRET: ${MRI_REVIEWER_JWT_HS256_SECRET:-compose-dev-reviewer-secret-0123456789abcdef}
    ports:
      - "${PORT:-4010}:${PORT:-4010}"
    healthcheck:
      test:
        - CMD
        - node
        - /app/scripts/container-healthcheck.mjs
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    init: true
    restart: unless-stopped
    stop_grace_period: 15s
    volumes:
      - app-data:/data

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mri_second_opinion
      POSTGRES_USER: mri
      POSTGRES_PASSWORD: mri
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mri -d mri_second_opinion"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - redis-data:/data

volumes:
  app-data:
  postgres-data:
  redis-data: