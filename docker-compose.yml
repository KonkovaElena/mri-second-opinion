services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mri_second_opinion
      POSTGRES_USER: mri
      POSTGRES_PASSWORD: mri
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mri -d mri_second_opinion"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data: